{% extends 'core/base.html' %}

{% block content %}
<style>
body { background-color: #f8fafc; }
.auth-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 4.5rem - 300px); /* rough calc considering header/footer */
    padding: 4rem 1rem;
}
.auth-card {
    background: white;
    padding: 3rem 2.5rem;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    width: 100%;
    max-width: 450px;
    border: 1px solid var(--border-color);
}
.auth-header {
    text-align: center;
    margin-bottom: 2rem;
}
.auth-title {
    font-size: 2rem;
    font-weight: 800;
    color: var(--text-main);
    margin-bottom: 0.5rem;
}
.auth-subtitle {
    color: var(--text-muted);
    font-size: 0.875rem;
}
</style>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <h2 class="auth-title">Iniciar Sesión</h2>
            <p class="auth-subtitle">Ingresa a tu cuenta de Loja Empleo</p>
        </div>
        
        <form id="loginForm" method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="loginEmail">Correo electrónico</label>
                <div style="position: relative;">
                    <span style="position: absolute; left: 1rem; top: 0.625rem; color: #9ca3af;">
                        <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                    </span>
                    <input type="email" id="loginEmail" name="email" class="form-control" required placeholder="ejemplo@correo.com" style="padding-left: 2.75rem;">
                </div>
            </div>

            <div class="form-group mb-8">
                <label for="loginPassword">Contraseña</label>
                <div style="position: relative;">
                    <span style="position: absolute; left: 1rem; top: 0.625rem; color: #9ca3af;">
                        <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </span>
                    <input type="password" id="loginPassword" name="password" class="form-control" required placeholder="********" style="padding-left: 2.75rem; padding-right: 2.75rem;">
                    <button type="button" onclick="togglePassword('loginPassword', this)" style="position: absolute; right: 1rem; top: 0.625rem; background: none; border: none; color: #9ca3af; cursor: pointer; padding: 0; outline: none; display: flex; align-items: center; justify-content: center;">
                        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>

            <div id="loginError" class="error-msg"></div>

            <button type="submit" class="btn btn-primary btn-block" style="padding: 0.875rem; font-size: 1rem;">Ingresar a mi cuenta</button>
            <p class="text-center mt-8 text-muted" style="font-size: 0.875rem;">
                ¿No tienes una cuenta? <a href="{% url 'registro' %}" class="text-primary font-semibold">Regístrate</a>
            </p>
        </form>
    </div>
</div>

<script>
function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
        </svg>`;
    } else {
        input.type = 'password';
        btn.innerHTML = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
        </svg>`;
    }
}
</script>
{% endblock %}
