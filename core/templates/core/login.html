{% extends 'core/base.html' %}

{% block content %}
<style>
body { background-color: #f8fafc; }
.auth-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 4.5rem - 300px); /* rough calc considering header/footer */
    padding: 4rem 1rem;
}
.auth-card {
    background: white;
    padding: 3rem 2.5rem;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    width: 100%;
    max-width: 450px;
    border: 1px solid var(--border-color);
}
.auth-header {
    text-align: center;
    margin-bottom: 2rem;
}
.auth-title {
    font-size: 2rem;
    font-weight: 800;
    color: var(--text-main);
    margin-bottom: 0.5rem;
}
.auth-subtitle {
    color: var(--text-muted);
    font-size: 0.875rem;
}
</style>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <h2 class="auth-title">Iniciar Sesión</h2>
            <p class="auth-subtitle">Ingresa a tu cuenta de Empleo Loja</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Correo electrónico</label>
                <div style="position: relative;">
                    <span style="position: absolute; left: 1rem; top: 0.625rem; color: #9ca3af;">✉️</span>
                    <input type="email" id="loginEmail" class="form-control" required placeholder="ejemplo@correo.com" style="padding-left: 2.5rem;">
                </div>
            </div>

            <div class="form-group mb-8">
                <label for="loginPassword">Contraseña</label>
                <div style="position: relative;">
                    <span style="position: absolute; left: 1rem; top: 0.625rem; color: #9ca3af;">🔒</span>
                    <input type="password" id="loginPassword" class="form-control" required placeholder="********" style="padding-left: 2.5rem;">
                </div>
            </div>

            <div id="loginError" class="error-msg"></div>

            <button type="submit" class="btn btn-primary btn-block" style="padding: 0.875rem; font-size: 1rem;">Ingresar a mi cuenta</button>
            <p class="text-center mt-8 text-muted" style="font-size: 0.875rem;">
                ¿No tienes una cuenta? <a href="{% url 'registro' %}" class="text-primary font-semibold">Regístrate</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
