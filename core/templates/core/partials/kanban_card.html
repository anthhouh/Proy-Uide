<div class="kanban-card" draggable="true" data-id="{{ p.id }}" data-current-status="{{ p.estado_actual }}">
    <div class="card-header">
        <div class="card-avatar">
            {% if p.foto %}
                <img src="{{ p.foto.url }}" alt="{{ p.nombre_visualizacion }}">
            {% else %}
                {{ p.nombre_visualizacion|make_list|first|upper }}
            {% endif %}
        </div>
        <div>
            <div class="card-name">{{ p.nombre_visualizacion }}</div>
            <div class="card-role">{{ p.cargo_titulo|default:"Postulante" }}</div>
        </div>
    </div>
    
    {% if p.descripcion %}
    <div class="card-details" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis;">
        {{ p.descripcion }}
    </div>
    {% endif %}

    <div class="card-actions">
        <!-- Optional: Link to see full profile if implemented -->
        <a href="{% url 'perfil' %}?id={{ p.id }}" class="btn-small" target="_blank" draggable="false">Ver Perfil</a>
        {% if p.hoja_de_vida %}
        <a href="{{ p.hoja_de_vida.url }}" class="btn-small" target="_blank" draggable="false" style="color: var(--primary-color); border-color: var(--primary-light);">CV 📄</a>
        {% endif %}
    </div>
</div>
