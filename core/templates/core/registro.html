{% extends 'core/base.html' %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Registro de Usuario</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="regRole">Soy un(a):</label>
                <select id="regRole" required>
                    <option value="postulante">Postulante (Busco trabajo)</option>
                    <option value="empresa">Empresa (Ofrezco trabajo)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="regName" id="lblRegName">Nombre Completo</label>
                <input type="text" id="regName" required placeholder="Ingresa tu nombre">
            </div>

            <div class="form-group">
                <label for="regEmail">Correo Electrónico</label>
                <input type="email" id="regEmail" required placeholder="correo@ejemplo.com">
            </div>

            <div class="form-group">
                <label for="regPassword">Contraseña</label>
                <input type="password" id="regPassword" required placeholder="Mínimo 6 caracteres">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Registrarse</button>
            <p class="auth-link">¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia Sesión</a></p>
        </form>
    </div>
</div>
{% endblock %}
