{% extends 'core/base.html' %}

{% block content %}
<style>
body { background-color: #f8fafc; }
.auth-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 4rem 1rem;
}
.auth-card {
    background: white;
    padding: 3rem 2.5rem;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    width: 100%;
    max-width: 480px;
    border: 1px solid var(--border-color);
}
.auth-header {
    text-align: center;
    margin-bottom: 2rem;
}
.auth-title {
    font-size: 2rem;
    font-weight: 800;
    color: var(--text-main);
    margin-bottom: 0.5rem;
}
.auth-subtitle {
    color: var(--text-muted);
    font-size: 0.875rem;
}
.role-selector {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.5rem;
}
.role-option {
    border: 2px solid var(--border-color);
    border-radius: var(--radius-md);
    padding: 1rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-muted);
    font-weight: 600;
    font-size: 0.875rem;
}
.role-option:hover {
    border-color: #bfdbfe;
    background-color: #eff6ff;
}
.role-option.active {
    border-color: var(--primary-color);
    background-color: #eff6ff;
    color: var(--primary-color);
}
.role-icon {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
    display: block;
}
</style>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <h2 class="auth-title">Crear Cuenta</h2>
            <p class="auth-subtitle">Únete a la plataforma de empleo líder en Loja</p>
        </div>
        
        <form id="registerForm" method="POST" action="{% url 'registro' %}">
            {% csrf_token %}
            <!-- Hidden input for JS compatibility -->
            <input type="hidden" id="regRole" name="role" value="postulante">
            
            <div class="form-group">
                <label>¿Cómo quieres usar la plataforma?</label>
                <div class="role-selector">
                    <div class="role-option active" data-role="postulante" onclick="selectRole('postulante', this)">
                        <span class="role-icon">
                            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width: 24px; height: 24px; margin: 0 auto;">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </span>
                        POSTULANTE
                    </div>
                    <div class="role-option" data-role="empresa" onclick="selectRole('empresa', this)">
                        <span class="role-icon">
                            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width: 24px; height: 24px; margin: 0 auto;">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                            </svg>
                        </span>
                        OFERTANTE
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="regName" id="lblRegName">Nombre completo</label>
                <div style="position: relative;">
                    <span style="position: absolute; left: 1rem; top: 0.625rem; color: #9ca3af;">
                        <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </span>
                    <input type="text" id="regName" name="name" class="form-control" required placeholder="Ej. Juan Pérez" style="padding-left: 2.75rem;">
                </div>
            </div>

            <div class="form-group">
                <label for="regUsername">Nombre de usuario</label>
                <div style="position: relative;">
                    <span style="position: absolute; left: 1rem; top: 0.625rem; color: #9ca3af;">
                        <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </span>
                    <input type="text" id="regUsername" name="username" class="form-control" required placeholder="Ej. juan_perez" style="padding-left: 2.75rem;" pattern="[a-zA-Z0-9_]+" title="Solo letras, números y guiones bajos">
                </div>
            </div>

            <div class="form-group">
                <label for="regEmail">Correo electrónico</label>
                <div style="position: relative;">
                    <span style="position: absolute; left: 1rem; top: 0.625rem; color: #9ca3af;">
                        <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                    </span>
                    <input type="email" id="regEmail" name="email" class="form-control" required placeholder="ejemplo@correo.com" style="padding-left: 2.75rem;">
                </div>
            </div>

            <div class="form-group mb-8">
                <label for="regPassword">Contraseña</label>
                <div style="position: relative;">
                    <span style="position: absolute; left: 1rem; top: 0.625rem; color: #9ca3af;">
                        <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </span>
                    <input type="password" id="regPassword" name="password" class="form-control" required minlength="8" placeholder="Mínimo 8 caracteres" style="padding-left: 2.75rem; padding-right: 2.75rem;">
                    <button type="button" onclick="togglePassword('regPassword', this)" style="position: absolute; right: 1rem; top: 0.625rem; background: none; border: none; color: #9ca3af; cursor: pointer; padding: 0; outline: none; display: flex; align-items: center; justify-content: center;">
                        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block" style="padding: 0.875rem; font-size: 1rem;">Registrarse ahora</button>
            <p class="text-center mt-8 text-muted" style="font-size: 0.875rem;">
                ¿Ya tienes una cuenta? <a href="{% url 'login' %}" class="text-primary font-semibold">Inicia sesión</a>
            </p>
        </form>
    </div>
</div>

<script>
function selectRole(role, element) {
    // Update hidden input
    document.getElementById('regRole').value = role;
    
    // Update active class
    const options = document.querySelectorAll('.role-option');
    options.forEach(opt => opt.classList.remove('active'));
    element.classList.add('active');
    
    // Update label text if needed
    const lbl = document.getElementById('lblRegName');
    if (role === 'empresa') {
        lbl.innerText = 'Nombre de la Empresa';
    } else {
        lbl.innerText = 'Nombre completo';
    }
}

function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
        </svg>`;
    } else {
        input.type = 'password';
        btn.innerHTML = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
        </svg>`;
    }
}
</script>
{% endblock %}
